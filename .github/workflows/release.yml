name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Docker 이미지 배포
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 태그 추출
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/ganji-dac-proxy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Proxy 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.proxy
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: API 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ganji-dac-api:${{ github.ref_name }}

      - name: Console 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.console
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ganji-dac-console:${{ github.ref_name }}
