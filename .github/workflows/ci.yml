name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Rust 툴체인 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 의존성 캐시
        uses: Swatinem/rust-cache@v2

      - name: 포맷 검사
        run: cargo fmt --all -- --check

      - name: Clippy (경고 = 오류)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 빌드
        run: cargo build --release

      - name: 테스트
        run: cargo test --all

  docker-build:
    name: Docker 빌드 검증
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Proxy 이미지 빌드
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.proxy
          push: false
          tags: ganji-dac/proxy:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: API 이미지 빌드
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: ganji-dac/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Console 이미지 빌드
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.console
          push: false
          tags: ganji-dac/console:ci

  security-audit:
    name: 보안 감사
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: cargo-audit 설치
        run: cargo install cargo-audit

      - name: 의존성 취약점 검사
        run: cargo audit
