<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간지-DAC 관리 콘솔</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
    .fade { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen" x-data="app()" x-init="init()" x-cloak>

  <!-- 헤더 -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🔐</span>
      <div>
        <h1 class="text-lg font-bold text-white">간지-DAC</h1>
        <p class="text-xs text-gray-400">DB 접근제어 관리 콘솔</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <!-- API 상태 -->
      <div class="flex items-center gap-2 text-sm">
        <span class="w-2 h-2 rounded-full" :class="health.ok ? 'bg-green-400' : 'bg-red-400'"></span>
        <span class="text-gray-400" x-text="health.ok ? 'API 연결됨' : 'API 연결 안됨'"></span>
      </div>
      <!-- API Key 입력 -->
      <input
        type="password"
        x-model="apiKey"
        @change="fetchRules()"
        placeholder="API Key"
        class="bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm text-gray-200 w-48 focus:outline-none focus:border-indigo-500"
      />
    </div>
  </header>

  <!-- 탭 -->
  <div class="bg-gray-900 border-b border-gray-800 px-6">
    <nav class="flex gap-1">
      <template x-for="tab in tabs" :key="tab.id">
        <button
          @click="activeTab = tab.id"
          class="px-4 py-3 text-sm font-medium border-b-2 transition-colors"
          :class="activeTab === tab.id
            ? 'border-indigo-500 text-indigo-400'
            : 'border-transparent text-gray-400 hover:text-gray-200'"
          x-text="tab.label"
        ></button>
      </template>
    </nav>
  </div>

  <!-- 메인 -->
  <main class="max-w-6xl mx-auto p-6">

    <!-- ── 규칙 관리 ── -->
    <div x-show="activeTab === 'rules'" class="fade">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">접근 정책 규칙 <span class="text-gray-500 text-sm ml-2" x-text="`(${rules.length}개)`"></span></h2>
        <button @click="openRuleModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-2 rounded-lg transition-colors">
          + 규칙 추가
        </button>
      </div>

      <!-- 로딩 -->
      <div x-show="loading" class="text-center py-12 text-gray-500">불러오는 중...</div>

      <!-- 규칙 목록 -->
      <div x-show="!loading" class="space-y-3">
        <template x-for="rule in rules" :key="rule.id">
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex items-start gap-4 hover:border-gray-700 transition-colors">
            <!-- 우선순위 -->
            <div class="text-center min-w-[40px]">
              <div class="text-xs text-gray-500 mb-1">우선순위</div>
              <div class="text-lg font-bold" :class="rule.priority <= 5 ? 'text-red-400' : rule.priority <= 20 ? 'text-yellow-400' : 'text-green-400'" x-text="rule.priority"></div>
            </div>

            <!-- 정보 -->
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <span class="font-medium text-white" x-text="rule.name"></span>
                <!-- 액션 배지 -->
                <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                  :class="{
                    'bg-red-900/50 text-red-300': rule.action === 'deny',
                    'bg-green-900/50 text-green-300': rule.action === 'allow',
                    'bg-yellow-900/50 text-yellow-300': rule.action === 'alert'
                  }"
                  x-text="rule.action === 'deny' ? '차단' : rule.action === 'allow' ? '허용' : '경고'">
                </span>
                <!-- 비활성화 -->
                <span x-show="!rule.enabled" class="text-xs px-2 py-0.5 rounded-full bg-gray-800 text-gray-500">비활성</span>
              </div>
              <div class="text-sm text-gray-400" x-text="rule.description || '설명 없음'"></div>
              <!-- 조건 태그 -->
              <div class="flex flex-wrap gap-1.5 mt-2">
                <template x-for="cond in rule.conditions" :key="JSON.stringify(cond)">
                  <span class="text-xs bg-gray-800 text-gray-300 px-2 py-0.5 rounded" x-text="formatCondition(cond)"></span>
                </template>
              </div>
            </div>

            <!-- 액션 버튼 -->
            <div class="flex items-center gap-2 shrink-0">
              <button @click="toggleRule(rule)" class="text-xs px-3 py-1.5 rounded-lg border transition-colors"
                :class="rule.enabled ? 'border-gray-700 text-gray-400 hover:border-gray-500' : 'border-indigo-800 text-indigo-400 hover:border-indigo-600'"
                x-text="rule.enabled ? '비활성화' : '활성화'">
              </button>
              <button @click="openRuleModal(rule)" class="text-xs px-3 py-1.5 rounded-lg border border-gray-700 text-gray-400 hover:border-gray-500 transition-colors">수정</button>
              <button @click="deleteRule(rule.id)" class="text-xs px-3 py-1.5 rounded-lg border border-red-900/50 text-red-400 hover:border-red-700 transition-colors">삭제</button>
            </div>
          </div>
        </template>

        <div x-show="rules.length === 0 && !loading" class="text-center py-12 text-gray-600">
          등록된 규칙이 없어요. 규칙을 추가해보세요.
        </div>
      </div>
    </div>

    <!-- ── 정책 시뮬레이션 ── -->
    <div x-show="activeTab === 'simulate'" class="fade max-w-2xl">
      <h2 class="text-lg font-semibold mb-4">정책 시뮬레이션</h2>
      <p class="text-sm text-gray-400 mb-6">실제 DB 연결 없이 접근 요청이 허용/차단되는지 테스트해요.</p>

      <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs text-gray-400 mb-1">클라이언트 IP</label>
            <input x-model="sim.client_ip" type="text" placeholder="10.0.0.1"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1">DB 사용자</label>
            <input x-model="sim.db_user" type="text" placeholder="admin"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1">DB 타입</label>
            <select x-model="sim.db_type" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
              <option value="postgresql">PostgreSQL</option>
              <option value="mysql">MySQL</option>
              <option value="mongodb">MongoDB</option>
              <option value="redis">Redis</option>
              <option value="mssql">MSSQL</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1">대상 DB</label>
            <input x-model="sim.target_db" type="text" placeholder="production"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">쿼리 (선택)</label>
          <textarea x-model="sim.query" placeholder="SELECT * FROM users" rows="3"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 font-mono resize-none"></textarea>
        </div>
        <button @click="runSimulation()" :disabled="simLoading"
          class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
          <span x-show="!simLoading">시뮬레이션 실행</span>
          <span x-show="simLoading">분석 중...</span>
        </button>
      </div>

      <!-- 결과 -->
      <div x-show="simResult" class="mt-4 bg-gray-900 border rounded-xl p-5 fade"
        :class="simResult?.result?.allowed ? 'border-green-800' : 'border-red-800'">
        <div class="flex items-center gap-3 mb-3">
          <span class="text-2xl" x-text="simResult?.result?.allowed ? '✅' : '🚫'"></span>
          <div>
            <div class="font-semibold" :class="simResult?.result?.allowed ? 'text-green-400' : 'text-red-400'"
              x-text="simResult?.result?.allowed ? '접근 허용' : '접근 차단'">
            </div>
            <div class="text-sm text-gray-400" x-text="simResult?.result?.reason"></div>
          </div>
        </div>
        <div x-show="simResult?.result?.matched_rule" class="text-xs text-gray-500">
          매칭 규칙: <span class="text-gray-300" x-text="simResult?.result?.matched_rule"></span>
        </div>
      </div>
    </div>

    <!-- ── 헬스체크 ── -->
    <div x-show="activeTab === 'health'" class="fade max-w-lg">
      <h2 class="text-lg font-semibold mb-4">시스템 상태</h2>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 space-y-4">
        <div class="flex justify-between items-center">
          <span class="text-gray-400 text-sm">API 서버</span>
          <span class="flex items-center gap-2 text-sm" :class="health.ok ? 'text-green-400' : 'text-red-400'">
            <span class="w-2 h-2 rounded-full" :class="health.ok ? 'bg-green-400' : 'bg-red-400'"></span>
            <span x-text="health.ok ? '정상' : '오류'"></span>
          </span>
        </div>
        <div class="flex justify-between items-center" x-show="health.data">
          <span class="text-gray-400 text-sm">버전</span>
          <span class="text-sm text-gray-300" x-text="health.data?.version"></span>
        </div>
        <div class="flex justify-between items-center" x-show="health.data">
          <span class="text-gray-400 text-sm">서비스명</span>
          <span class="text-sm text-gray-300" x-text="health.data?.service"></span>
        </div>
        <button @click="checkHealth()" class="w-full mt-2 bg-gray-800 hover:bg-gray-700 text-gray-300 py-2 rounded-lg text-sm transition-colors">
          새로고침
        </button>
      </div>
    </div>

  </main>

  <!-- 규칙 모달 -->
  <div x-show="showModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" @click.self="showModal = false">
    <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-lg fade" @click.stop>
      <h3 class="text-lg font-semibold mb-5" x-text="editRule.id ? '규칙 수정' : '규칙 추가'"></h3>

      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-400 mb-1">규칙 ID *</label>
            <input x-model="editRule.id" :disabled="!!editRule._editing" type="text" placeholder="my-rule-id"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 disabled:opacity-50" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1">우선순위 *</label>
            <input x-model.number="editRule.priority" type="number" min="1" max="999"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">이름 *</label>
          <input x-model="editRule.name" type="text" placeholder="규칙 이름"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">설명</label>
          <input x-model="editRule.description" type="text" placeholder="규칙 설명"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-400 mb-1">액션 *</label>
            <select x-model="editRule.action" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
              <option value="deny">차단 (Deny)</option>
              <option value="allow">허용 (Allow)</option>
              <option value="alert">경고 (Alert)</option>
            </select>
          </div>
          <div class="flex items-end">
            <label class="flex items-center gap-2 cursor-pointer pb-2">
              <input type="checkbox" x-model="editRule.enabled" class="w-4 h-4 accent-indigo-500" />
              <span class="text-sm text-gray-300">활성화</span>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">조건 (JSON)</label>
          <textarea x-model="editRule.conditionsJson" rows="4" placeholder='[{"type":"ip_range","cidr":"10.0.0.0/8"}]'
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-indigo-500 resize-none"></textarea>
        </div>
      </div>

      <div x-show="modalError" class="mt-3 text-sm text-red-400 bg-red-900/20 border border-red-900/50 rounded-lg px-3 py-2" x-text="modalError"></div>

      <div class="flex gap-3 mt-5">
        <button @click="showModal = false" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 py-2.5 rounded-lg text-sm transition-colors">취소</button>
        <button @click="saveRule()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">저장</button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div x-show="toast.show" x-transition class="fixed bottom-6 right-6 z-50">
    <div class="flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-sm font-medium"
      :class="toast.type === 'success' ? 'bg-green-900 text-green-200 border border-green-700' : 'bg-red-900 text-red-200 border border-red-700'">
      <span x-text="toast.type === 'success' ? '✅' : '❌'"></span>
      <span x-text="toast.message"></span>
    </div>
  </div>

<script>
function app() {
  return {
    apiKey: localStorage.getItem('ganji_api_key') || 'change-me-in-production',
    apiBase: `${window.location.protocol}//${window.location.hostname}:8080`,
    activeTab: 'rules',
    tabs: [
      { id: 'rules', label: '📋 규칙 관리' },
      { id: 'simulate', label: '🧪 시뮬레이션' },
      { id: 'health', label: '💚 시스템 상태' },
    ],
    rules: [],
    loading: false,
    health: { ok: false, data: null },
    sim: { client_ip: '10.0.0.1', db_user: 'admin', db_type: 'postgresql', target_db: 'production', query: '' },
    simResult: null,
    simLoading: false,
    showModal: false,
    editRule: {},
    modalError: '',
    toast: { show: false, message: '', type: 'success' },

    async init() {
      await this.checkHealth();
      await this.fetchRules();
    },

    headers() {
      localStorage.setItem('ganji_api_key', this.apiKey);
      return { 'Authorization': `Bearer ${this.apiKey}`, 'Content-Type': 'application/json' };
    },

    async checkHealth() {
      try {
        const r = await fetch(`${this.apiBase}/health`);
        if (r.ok) { this.health = { ok: true, data: await r.json() }; }
        else { this.health = { ok: false, data: null }; }
      } catch { this.health = { ok: false, data: null }; }
    },

    async fetchRules() {
      this.loading = true;
      try {
        const r = await fetch(`${this.apiBase}/api/rules`, { headers: this.headers() });
        if (r.ok) { const d = await r.json(); this.rules = d.rules || []; }
      } catch (e) { this.showToast('규칙 조회 실패: ' + e.message, 'error'); }
      this.loading = false;
    },

    async toggleRule(rule) {
      try {
        const r = await fetch(`${this.apiBase}/api/rules/${rule.id}/toggle`, { method: 'POST', headers: this.headers() });
        if (r.ok) { this.showToast(rule.enabled ? '규칙 비활성화' : '규칙 활성화'); await this.fetchRules(); }
        else { this.showToast('변경 실패', 'error'); }
      } catch (e) { this.showToast('오류: ' + e.message, 'error'); }
    },

    async deleteRule(id) {
      if (!confirm(`규칙 '${id}'을 삭제할까요?`)) return;
      try {
        const r = await fetch(`${this.apiBase}/api/rules/${id}`, { method: 'DELETE', headers: this.headers() });
        if (r.ok) { this.showToast('규칙 삭제 완료'); await this.fetchRules(); }
        else { this.showToast('삭제 실패', 'error'); }
      } catch (e) { this.showToast('오류: ' + e.message, 'error'); }
    },

    openRuleModal(rule) {
      this.modalError = '';
      if (rule) {
        this.editRule = {
          ...rule,
          _editing: true,
          conditionsJson: JSON.stringify(rule.conditions, null, 2),
        };
      } else {
        this.editRule = { id: '', name: '', description: '', priority: 100, action: 'deny', enabled: true, conditionsJson: '[]', _editing: false };
      }
      this.showModal = true;
    },

    async saveRule() {
      this.modalError = '';
      let conditions;
      try { conditions = JSON.parse(this.editRule.conditionsJson); }
      catch { this.modalError = '조건 JSON 형식 오류'; return; }

      const payload = {
        id: this.editRule.id,
        name: this.editRule.name,
        description: this.editRule.description || null,
        priority: this.editRule.priority,
        action: this.editRule.action,
        enabled: this.editRule.enabled,
        conditions,
      };

      try {
        const isEdit = !!this.editRule._editing;
        const url = isEdit ? `${this.apiBase}/api/rules/${this.editRule.id}` : `${this.apiBase}/api/rules`;
        const method = isEdit ? 'PUT' : 'POST';
        const r = await fetch(url, { method, headers: this.headers(), body: JSON.stringify(payload) });
        const data = await r.json();
        if (r.ok) {
          this.showToast(isEdit ? '규칙 수정 완료' : '규칙 추가 완료');
          this.showModal = false;
          await this.fetchRules();
        } else {
          this.modalError = data.error || '저장 실패';
        }
      } catch (e) { this.modalError = '오류: ' + e.message; }
    },

    async runSimulation() {
      this.simLoading = true;
      this.simResult = null;
      try {
        const r = await fetch(`${this.apiBase}/api/audit/simulate`, {
          method: 'POST', headers: this.headers(),
          body: JSON.stringify({ ...this.sim, query: this.sim.query || null }),
        });
        if (r.ok) { this.simResult = await r.json(); }
        else { this.showToast('시뮬레이션 실패', 'error'); }
      } catch (e) { this.showToast('오류: ' + e.message, 'error'); }
      this.simLoading = false;
    },

    formatCondition(cond) {
      const map = {
        ip_range: `IP: ${cond.cidr}`,
        db_user: `사용자: ${cond.pattern}`,
        db_type: `DB: ${cond.db_type}`,
        target_db: `DB명: ${cond.pattern}`,
        query_pattern: `쿼리: ${cond.regex}`,
        time_range: `시간: ${cond.start_hour}시~${cond.end_hour}시`,
        iam_arn: `IAM: ${cond.pattern}`,
        block_dangerous_query: '위험 쿼리 감지',
      };
      return map[cond.type] || cond.type;
    },

    showToast(message, type = 'success') {
      this.toast = { show: true, message, type };
      setTimeout(() => { this.toast.show = false; }, 3000);
    },
  };
}
</script>
</body>
</html>
