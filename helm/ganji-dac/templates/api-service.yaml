apiVersion: v1
kind: Service
metadata:
  name: {{ include "ganji-dac.fullname" . }}-api
  labels:
    {{- include "ganji-dac.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "ganji-dac.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
