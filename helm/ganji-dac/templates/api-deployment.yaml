apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ganji-dac.fullname" . }}-api
  labels:
    {{- include "ganji-dac.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "ganji-dac.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "ganji-dac.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ include "ganji-dac.image" (dict "global" .Values.global "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          env:
            - name: API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ganji-dac.fullname" . }}-secret
                  key: api-key
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ganji-dac.fullname" . }}-secret
                  key: redis-password
            - name: POLICY_STORE_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ include "ganji-dac.fullname" . }}-redis:6379"
            - name: AWS_REGION
              value: {{ .Values.proxy.aws.region | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
