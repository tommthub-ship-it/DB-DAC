name: ganji-dac

services:

  # ──────────────────────────────────────────────────────────
  # DB 접근제어 프록시
  # ──────────────────────────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: ganji-proxy
    restart: unless-stopped
    ports:
      - "15432:15432"   # PostgreSQL 프록시
      - "15306:15306"   # MySQL 프록시 (예정)
      - "15017:15017"   # MongoDB 프록시 (예정)
      - "16379:16379"   # Redis 프록시 (예정)
      - "11433:11433"   # MSSQL 프록시 (예정)
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # PostgreSQL 업스트림 (실제 DB 주소)
      PG_UPSTREAM: ${PG_UPSTREAM:-postgres:5432}
      # MySQL 업스트림
      MYSQL_UPSTREAM: ${MYSQL_UPSTREAM:-mysql:3306}
      # MongoDB 업스트림
      MONGO_UPSTREAM: ${MONGO_UPSTREAM:-mongo:27017}
      # Redis 업스트림
      REDIS_UPSTREAM: ${REDIS_UPSTREAM:-redis:6379}
      # 감사 로그 파일 경로
      AUDIT_LOG_PATH: /var/log/ganji-dac/audit.jsonl
      # AWS 설정 (CloudWatch 연동 시)
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      CLOUDWATCH_LOG_GROUP: ${CLOUDWATCH_LOG_GROUP:-/ganji-dac/audit}
      CLOUDWATCH_LOG_STREAM: ${CLOUDWATCH_LOG_STREAM:-proxy}
    volumes:
      - audit-logs:/var/log/ganji-dac
      - ./config/policies.json:/app/policies.json:ro
    networks:
      - ganji-internal
      - ganji-db
    depends_on:
      - policy-store
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "15432"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # 관리 API 서버
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ganji-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      API_SECRET: ${API_SECRET:-change-me-in-production}
      POLICY_STORE_URL: redis://policy-store:6379
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
    networks:
      - ganji-internal
    depends_on:
      - policy-store
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # 정책 저장소 (Redis — 인메모리 + 빠른 룰 동기화)
  # ──────────────────────────────────────────────────────────
  policy-store:
    image: redis:7-alpine
    container_name: ganji-policy-store
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-ganji-dac-secret} --appendonly yes
    volumes:
      - policy-data:/data
    networks:
      - ganji-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ganji-dac-secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # 관리 콘솔 (웹 UI)
  # ──────────────────────────────────────────────────────────
  console:
    build:
      context: .
      dockerfile: Dockerfile.console
    container_name: ganji-console
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - ganji-internal
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # 감사 로그 뷰어 (개발/운영 확인용)
  # ──────────────────────────────────────────────────────────
  log-viewer:
    image: amir20/dozzle:latest
    container_name: ganji-log-viewer
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ganji-internal
    profiles:
      - dev   # docker compose --profile dev up 으로만 실행

  # ──────────────────────────────────────────────────────────
  # 개발용 PostgreSQL (실제 운영에서는 RDS로 교체)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ganji-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-devdb}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - ganji-db
    profiles:
      - dev   # 개발 환경에서만 실행
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  audit-logs:
    driver: local
  policy-data:
    driver: local
  pg-data:
    driver: local

networks:
  ganji-internal:   # 내부 서비스 통신
    driver: bridge
  ganji-db:         # DB 연결 전용 네트워크 (격리)
    driver: bridge
